<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tes</title>
    <link rel="stylesheet" href="example2.css">
</head>
<body>
    <div class="container">
        <!-- 1. SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <span></span> iSERVICE
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="active"><span>🏠</span> Dashboard</a></li>
                    <li><a href="#"><span></span> Transaksi Servis</a></li>
                    <li><a href="#"><span></span> Laporan Pendapatan</a></li>
                </ul>
            </nav>
            <div class="logout">
                <a href="#"><span></span> Keluar</a>
            </div>
        </aside>

        <!-- 2. AREA KANAN -->
        <div class="main-wrapper">
            <!-- HEADER -->
            <header class="header">
                <div class="user-welcome">
                    <h3>Halo, Kasir01</h3>
                    <p>Selamat bekerja hari ini!</p>
                </div>
                <div class="user-profile">
                    <span>Customer Service</span>
                    <div class="avatar">CS</div>
                </div>
            </header>

            <!-- CONTENT -->
            <main class="content">
                <div class="content-header">
                    <h2>Ringkasan Dashboard</h2>
                    <button class="btn-add">+ Penerimaan Servis Baru</button>
                </div>

                <!-- Contoh Card Statistik -->
                <div class="stats-grid">
                    <div class="card orange">
                        <div class="icon">iServ</div>
                        <div>
                            <p>Dalam Antrean</p>
                            <strong>5 Unit</strong>
                        </div>
                    </div>
                    <div class="card blue">
                        <div class="icon">Iserv</div>
                        <div>
                            <p>Sedang Diproses</p>
                            <strong>3 Unit</strong>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
